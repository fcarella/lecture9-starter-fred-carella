<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Management</title>
</head>
<body>
<div th:replace="~{fragments/navbar :: header}"></div>

<h1>Book Management (CRUD)</h1>


<!-- Link to the Create Form -->
<a th:href="@{/books/new}">
    <button>+ Add New Book</button>
</a>
<br/><br/>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Price</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="book : ${books}">
        <td th:text="${book.id}">1</td>
        <td th:text="${book.title}">Title</td>
        <td th:text="${book.author}">Author</td>
        <td th:text="${'$' + book.price}">$0.00</td>
        <td>
            <!-- Link to Edit, injecting the book's ID into the URL -->
            <a th:href="@{/books/edit/{id}(id=${book.id})}">Edit</a> |

            <!-- Link to Delete, injecting the book's ID into the URL -->
            <a th:href="@{/books/delete/{id}(id=${book.id})}"
               onclick="return confirm('Are you sure you want to delete this book?');">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

<br/>
<a th:href="@{/inventory}">Back to Main Inventory</a>
</body>
</html>
